# Mosquitto Configuration
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Permitir conexiones anónimas (cambiar en producción)
allow_anonymous true

# Persistencia
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
connection_messages true
log_timestamp true
