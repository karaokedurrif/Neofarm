<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#B07D2B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B07D2B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="20%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#B07D2B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <ellipse cx="256" cy="300" rx="200" ry="160" fill="url(#glow)"/>
  <!-- Shadow -->
  <ellipse cx="256" cy="408" rx="80" ry="14" fill="rgba(0,0,0,0.3)"/>
  <!-- Body -->
  <ellipse cx="260" cy="300" rx="75" ry="60" fill="#C8956A" stroke="#B88555" stroke-width="1"/>
  <!-- Feather texture -->
  <ellipse cx="245" cy="290" rx="58" ry="45" fill="#D4A070" opacity="0.5"/>
  <ellipse cx="270" cy="310" rx="50" ry="35" fill="#BA8858" opacity="0.4"/>
  <!-- Wing -->
  <path d="M320 280 Q360 260, 355 300 Q350 340, 310 340 Q325 310, 320 280Z" fill="#A07848" stroke="#907040" stroke-width="0.5"/>
  <path d="M320 285 Q345 270, 342 300" stroke="#806838" stroke-width="0.5" fill="none"/>
  <path d="M318 295 Q340 285, 340 310" stroke="#806838" stroke-width="0.5" fill="none"/>
  <!-- Tail feathers -->
  <path d="M335 285 Q375 240, 365 220" stroke="#8A6838" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M338 290 Q370 250, 372 228" stroke="#A07848" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M336 295 Q368 265, 378 238" stroke="#7A5828" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="225" y="348" width="10" height="48" rx="3" fill="#D4A060"/>
  <rect x="265" y="345" width="10" height="51" rx="3" fill="#C89858"/>
  <!-- Feet -->
  <path d="M218 395 L235 395 L240 400 L235 405 L230 400 L225 405 L220 400Z" fill="#D4A060"/>
  <path d="M258 395 L275 395 L280 400 L275 405 L270 400 L265 405 L260 400Z" fill="#C89858"/>
  <!-- Neck -->
  <path d="M205 285 Q185 255, 175 220 Q172 205, 178 195" fill="#D4A070" stroke="#B88555" stroke-width="1"/>
  <!-- Head -->
  <circle cx="178" cy="192" r="25" fill="#D4A070" stroke="#B88555" stroke-width="1"/>
  <!-- Comb -->
  <path d="M170 170 Q175 155, 180 162 Q185 152, 190 163 Q195 155, 195 168" fill="#CC3333" stroke="#AA2222" stroke-width="0.5"/>
  <!-- Eye -->
  <circle cx="170" cy="188" r="5" fill="#1A1208"/>
  <circle cx="169" cy="187" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <!-- Beak -->
  <path d="M155 196 L138 200 L155 204Z" fill="#E8A830" stroke="#D09020" stroke-width="0.5"/>
  <!-- Wattle -->
  <path d="M163 206 Q158 218, 165 222 Q168 215, 168 208Z" fill="#CC3333" opacity="0.8"/>
  <!-- Rim light -->
  <ellipse cx="260" cy="300" rx="75" ry="60" fill="url(#rim)" opacity="0.6"/>
