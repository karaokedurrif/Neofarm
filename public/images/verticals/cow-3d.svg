<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#3D7A5F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3D7A5F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="40%" stop-color="#E8DCC8"/>
      <stop offset="60%" stop-color="#6B5535"/>
      <stop offset="100%" stop-color="#4A3728"/>
    </linearGradient>
    <radialGradient id="rim" cx="20%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3D7A5F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <ellipse cx="256" cy="300" rx="200" ry="160" fill="url(#glow)"/>
  <!-- Shadow -->
  <ellipse cx="256" cy="410" rx="120" ry="18" fill="rgba(0,0,0,0.3)"/>
  <!-- Body -->
  <ellipse cx="248" cy="280" rx="95" ry="65" fill="#F0E8D4" stroke="#D4C4A8" stroke-width="1"/>
  <!-- Holstein patches -->
  <ellipse cx="210" cy="260" rx="35" ry="28" fill="#4A3728" opacity="0.85"/>
  <ellipse cx="280" cy="295" rx="30" ry="22" fill="#3D2E1F" opacity="0.8"/>
  <ellipse cx="235" cy="300" rx="20" ry="18" fill="#45352A" opacity="0.7"/>
  <!-- Udder -->
  <ellipse cx="265" cy="340" rx="22" ry="15" fill="#F0D0C0"/>
  <!-- Legs (4) -->
  <rect x="175" y="330" width="18" height="65" rx="6" fill="#E0D4C0"/>
  <rect x="210" y="335" width="17" height="60" rx="6" fill="#D8C8B0"/>
  <rect x="275" y="332" width="17" height="63" rx="6" fill="#E0D4C0"/>
  <rect x="305" y="328" width="18" height="67" rx="6" fill="#D8C8B0"/>
  <!-- Hooves -->
  <rect x="175" y="390" width="18" height="10" rx="4" fill="#3A2A1A"/>
  <rect x="210" y="390" width="17" height="10" rx="4" fill="#3A2A1A"/>
  <rect x="275" y="390" width="17" height="10" rx="4" fill="#3A2A1A"/>
  <rect x="305" y="390" width="18" height="10" rx="4" fill="#3A2A1A"/>
  <!-- Neck -->
  <path d="M165 265 Q148 240, 145 210 Q142 195, 148 185" fill="#F0E8D4" stroke="#D4C4A8" stroke-width="1"/>
  <!-- Head -->
  <ellipse cx="145" cy="195" rx="32" ry="38" fill="#F0E8D4" stroke="#D4C4A8" stroke-width="1"/>
  <!-- Face patch -->
  <ellipse cx="140" cy="185" rx="18" ry="15" fill="#4A3728" opacity="0.6"/>
  <!-- Eye -->
  <circle cx="132" cy="188" r="5" fill="#1A1208"/>
  <circle cx="131" cy="187" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <!-- Nose/muzzle -->
  <ellipse cx="128" cy="212" rx="15" ry="11" fill="#E8C8B0" stroke="#C8A890" stroke-width="1"/>
  <circle cx="123" cy="213" r="3" fill="#6A4A38"/>
  <circle cx="133" cy="213" r="3" fill="#6A4A38"/>
  <!-- Ear -->
  <path d="M158 168 Q170 148, 178 155 Q175 168, 162 175Z" fill="#E8D8C0" stroke="#C8B8A0" stroke-width="0.5"/>
  <!-- Horn -->
  <path d="M150 165 Q155 142, 162 138" stroke="#D8D0C0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M340 270 Q365 255, 370 280 Q375 310, 365 330" stroke="#8B7355" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="365" cy="332" rx="6" ry="8" fill="#4A3728"/>
  <!-- Rim light -->
  <ellipse cx="248" cy="280" rx="95" ry="65" fill="url(#rim)" opacity="0.6"/>
</svg>
