<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#3B6B82" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B6B82" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="20%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3B6B82" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <ellipse cx="256" cy="300" rx="200" ry="160" fill="url(#glow)"/>
  <!-- Shadow -->
  <ellipse cx="256" cy="400" rx="110" ry="16" fill="rgba(0,0,0,0.3)"/>
  <!-- Body (large round pig body) -->
  <ellipse cx="255" cy="290" rx="100" ry="75" fill="#F5DDD0" stroke="#E8C8B8" stroke-width="1"/>
  <!-- Pink tones -->
  <ellipse cx="240" cy="285" rx="80" ry="60" fill="#F0C8B8" opacity="0.4"/>
  <!-- Belly -->
  <ellipse cx="260" cy="330" rx="60" ry="30" fill="#FADADD" opacity="0.3"/>
  <!-- Legs (4 short stubby) -->
  <rect x="175" y="345" width="22" height="45" rx="8" fill="#F0C8B8"/>
  <rect x="210" y="348" width="20" height="42" rx="8" fill="#E8BEB0"/>
  <rect x="280" y="346" width="20" height="44" rx="8" fill="#F0C8B8"/>
  <rect x="310" y="343" width="22" height="47" rx="8" fill="#E8BEB0"/>
  <!-- Hooves -->
  <rect x="177" y="386" width="18" height="8" rx="4" fill="#8B6B58"/>
  <rect x="212" y="386" width="16" height="8" rx="4" fill="#8B6B58"/>
  <rect x="282" y="386" width="16" height="8" rx="4" fill="#8B6B58"/>
  <rect x="312" y="386" width="18" height="8" rx="4" fill="#8B6B58"/>
  <!-- Neck -->
  <path d="M170 275 Q155 255, 150 235" fill="#F5DDD0" stroke="#E8C8B8" stroke-width="1"/>
  <!-- Head -->
  <ellipse cx="148" cy="228" rx="38" ry="35" fill="#F5DDD0" stroke="#E8C8B8" stroke-width="1"/>
  <!-- Snout -->
  <ellipse cx="120" cy="238" rx="22" ry="16" fill="#F0B8A8" stroke="#E0A898" stroke-width="1"/>
  <circle cx="114" cy="237" r="4" fill="#C88878"/>
  <circle cx="126" cy="237" r="4" fill="#C88878"/>
  <!-- Eye -->
  <circle cx="142" cy="220" r="6" fill="#2A1A10"/>
  <circle cx="141" cy="219" r="2" fill="#FFFFFF" opacity="0.6"/>
  <!-- Ears (large floppy) -->
  <path d="M165 205 Q178 175, 192 180 Q188 198, 172 210Z" fill="#F0B8A8" stroke="#E0A898" stroke-width="0.5"/>
  <path d="M140 205 Q128 178, 115 185 Q120 200, 135 210Z" fill="#F0B8A8" stroke="#E0A898" stroke-width="0.5"/>
  <!-- Curly tail -->
  <path d="M352 270 Q370 260, 375 275 Q380 290, 370 298 Q362 305, 368 315" stroke="#F0B8A8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Rim light -->
  <ellipse cx="255" cy="290" rx="100" ry="75" fill="url(#rim)" opacity="0.6"/>
</svg>
