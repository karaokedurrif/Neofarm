version: '3.8'

services:
  neofarm-landing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neofarm-landing
    restart: unless-stopped
    ports:
      - "3020:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://app.neofarm.io
      - NEXT_PUBLIC_API_URL=https://api.neofarm.io
    networks:
      - neofarm-network

networks:
  neofarm-network:
    external: true
    name: vacasdata-hub-v2_vacasdata-v2-network
